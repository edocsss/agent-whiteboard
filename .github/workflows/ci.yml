name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go ${{ matrix.go-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        go-version:
          - 1.25.x
          - 1.26.x
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Build CLI
        run: go build -trimpath ./cmd/agent-whiteboard

  browser-assets:
    name: Browser and generated assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
          cache-dependency-path: go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Activate pinned pnpm
        run: |
          npm install --global corepack@0.35.0
          corepack enable
          corepack prepare pnpm@11.4.0 --activate
          pnpm --version

      - name: Resolve pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm and Playwright caches
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.pnpm-store.outputs.path }}
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-pnpm-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-playwright-

      - name: Install browser dependencies
        run: pnpm install --frozen-lockfile

      - name: Test browser renderer
        run: pnpm test

      - name: Verify generated assets
        run: pnpm run check:assets

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser integration tests
        run: pnpm run test:browser

      - name: Verify generated files are committed
        run: git diff --exit-code
